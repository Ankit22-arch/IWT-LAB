<html> 
<head> 
<title>5.4</title> 
<script language="JavaScript"> 
var a=new Array(1,2,3,4,5); 
var i,sum=0,avg=0,l=a[0],s=a[0]; 
for(i=4;i>=0;i--) 
{ 
 sum = sum+a[i];
 if(a[i]>l)
	l=a[i];
 if(a[i]<s)
	s = a[i];
} 
document.write("Sum is"+sum);

avg = sum/5;
document.write("Average is"+avg);

document.write("Largest is"+l);

document.write("Smallest is"+s);
</script> 
</head> 
<body bgcolor="yellow" text="blue"> 
</body> 
</html>
