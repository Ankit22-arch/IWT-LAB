<html>
<head>
<title>Q1</title>
<script language="Javascript">
let marks=parseInt(prompt("Enter marks"));
if(marks>=90)
document.write("Grade is A");
else if(marks>=75)
document.write("Grade is B");
else if(marks>=50)
document.write("Grade is c");
else if(marks<50)
document.write("fail")
</script>
</head>
<body bgcolor="pink" text="green">
</body>
</html>
