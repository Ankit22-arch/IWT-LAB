<html>
<head>
  <title>Currency Converter</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .converter { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
    label { display: block; margin-top: 10px; }
    select, input { width: 100%; padding: 8px; margin-top: 5px; }
    button { margin-top: 15px; padding: 10px; width: 100%; }
    .output { margin-top: 15px; font-weight: bold; }
    .error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="converter">
    <h2>Currency Converter</h2>
    
    <label for="fromCurrency">From:</label>
    <select id="fromCurrency">
      <option value="">--Select Currency--</option>
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="GBP">GBP</option>
      <option value="INR">INR</option>
      <option value="AUD">AUD</option>
    </select>
    
    <label for="toCurrency">To:</label>
    <select id="toCurrency">
      <option value="">--Select Currency--</option>
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="GBP">GBP</option>
      <option value="INR">INR</option>
      <option value="AUD">AUD</option>
    </select>
    
    <label for="amount">Amount:</label>
    <input type="number" id="amount" placeholder="Enter amount">
    
    <button onclick="convertCurrency()">Convert</button>
    
    <div class="output" id="result"></div>
    <div class="error" id="error"></div>
  </div>

  <script>
    const conversionRates = {
      USD: { EUR: 0.93, GBP: 0.82, INR: 82.74, AUD: 1.47 },
      EUR: { USD: 1.08, GBP: 0.88, INR: 89.06, AUD: 1.58 },
      GBP: { USD: 1.22, EUR: 1.14, INR: 101.5, AUD: 1.80 },
      INR: { USD: 0.012, EUR: 0.011, GBP: 0.0098, AUD: 0.018 },
      AUD: { USD: 0.68, EUR: 0.63, GBP: 0.55, INR: 55.87 }
    };

    function convertCurrency() {
      const from = document.getElementById("fromCurrency").value;
      const to = document.getElementById("toCurrency").value;
      const amount = document.getElementById("amount").value;
      const resultDiv = document.getElementById("result");
      const errorDiv = document.getElementById("error");

      resultDiv.innerText = "";
      errorDiv.innerText = "";

      if (!from || !to || !amount) {
        errorDiv.innerText = "Please fill in all fields.";
        return;
      }

      if (from === to) {
        errorDiv.innerText = "Source and target currencies cannot be the same.";
        return;
      }

      const rate = conversionRates[from][to];
      if (!rate) {
        errorDiv.innerText = "Conversion rate not available.";
        return;
      }

      const converted = (amount * rate).toFixed(2);
      resultDiv.innerText = `${amount} ${from} = ${converted} ${to}`;
    }
  </script>
</body>
</html>
